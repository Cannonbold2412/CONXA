name: Build Runtime Host Layer

# Builds the large host binary (~85 MB) that ships quarterly.
# Contains: Node.js runtime + all bundled npm deps + bootstrap.js entry point.
# Also builds keytar.node which must match the Node ABI in the pkg binary.
#
# Tag format: host-v<semver>  (e.g. host-v1.0.0)

on:
  push:
    tags:
      - "host-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. host-v1.0.0)"
        required: true

jobs:
  build-conxa-runtime:
    runs-on: windows-latest
    permissions:
      contents: write  # needed to create GitHub Releases

    env:
      HOST_VERSION: ${{ github.ref_name || inputs.tag }}
      # Exact Node @yao-pkg/pkg embeds for the node24 target. Keep in lockstep with
      # build-runtime-app.yml's NODE_VERSION so app bytecode matches this exe's V8.
      NODE_VERSION: "24.15.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: runtime/package-lock.json

      - name: Install build tools (NASM + VS Build Tools for keytar)
        run: |
          choco install nasm --no-progress -y
          choco install visualstudio2022buildtools --package-parameters "--add Microsoft.VisualStudio.Workload.VCTools" --no-progress -y
        shell: pwsh

      - name: Install runtime dependencies
        working-directory: runtime
        run: npm ci

      - name: Stamp version, host_version, and manifest public key
        working-directory: runtime
        run: |
          # bootstrap.js bakes these fields from package.json into the pkg exe at build
          # time — env vars are NOT readable at runtime from inside the pkg binary.
          #   host_version        → HOST_VERSION constant used for app layer min_host semver gate
          #   version             → global.__runtimeVersion exposed to the disk-resident app layer
          #   ed25519_public_key  → global.__manifestPublicKey, used by manifest_manager.js to
          #                         verify the signed manifest.json's Ed25519 signature. This is a
          #                         long-lived org secret (does not change per release), stored as
          #                         the CONXA_MANIFEST_PUBLIC_KEY repo variable — never the private
          #                         key, which stays server-side as CONXA_MANIFEST_SIGNING_KEY.
          $semver = "$env:HOST_VERSION" -replace '^host-v', ''
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $pkg.version      = $semver
          $pkg.host_version = "$env:HOST_VERSION"
          if ("$env:MANIFEST_PUBLIC_KEY") { $pkg.ed25519_public_key = "$env:MANIFEST_PUBLIC_KEY" }
          $pkg | ConvertTo-Json -Depth 10 | Out-File -Encoding utf8 package.json
          Write-Output "version stamped:      $semver"
          Write-Output "host_version stamped: $env:HOST_VERSION"
          Write-Output "manifest public key stamped: $(if ($env:MANIFEST_PUBLIC_KEY) { 'yes' } else { 'no (unset)' })"
        shell: pwsh
        env:
          MANIFEST_PUBLIC_KEY: ${{ vars.CONXA_MANIFEST_PUBLIC_KEY }}

      - name: Build conxa-runtime.exe
        working-directory: runtime
        # build:win passes --no-bytecode --public-packages "*" (see runtime/package.json).
        # REQUIRED: pkg's V8 bytecode compilation corrupts Playwright's ~300 KB
        # injectedScriptSource string module, which silently breaks the selector engine —
        # every locator/getByRole/CSS query returns 0 while page.evaluate still works, so
        # all skills fail at the first click. Plain source keeps Playwright functional.
        # Do NOT remove these flags without re-running a real execute_skill replay against
        # the resulting exe (the init-only gate in build-runtime-app.yml will NOT catch it).
        run: npm run build:win

      - name: Install Chromium for execution gate
        working-directory: runtime
        run: npx playwright install chromium
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}\.pw-browsers

      - name: Execution gate — real skill replay (selector engine must resolve)
        # Drives the freshly-built exe through a hermetic navigate+click skill against a
        # local file:// fixture and asserts it reaches "Done.". This is the check that
        # would have caught the pkg-bytecode regression (selector engine returning 0
        # elements). The app layer defaults to the current runtime/ source.
        working-directory: runtime
        run: node test/gate_replay.js dist/conxa-runtime.exe
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}\.pw-browsers

      - name: Stage keytar.node for release
        working-directory: runtime
        run: |
          $src = "node_modules\keytar\build\Release\keytar.node"
          if (-not (Test-Path $src)) {
            Write-Error "keytar.node not found at $src — native build may have failed"
            exit 1
          }
          Copy-Item $src -Destination "keytar.node"
          Write-Output "Staged keytar.node ($((Get-Item keytar.node).Length) bytes)"
        shell: pwsh

      - name: Compute SHA-256 checksums
        working-directory: runtime
        run: |
          $winHash    = (Get-FileHash dist/conxa-runtime.exe -Algorithm SHA256).Hash.ToLower()
          $keytarHash = (Get-FileHash keytar.node               -Algorithm SHA256).Hash.ToLower()
          Write-Output "HOST_WIN_SHA256=$winHash"   | Out-File -Append $env:GITHUB_ENV
          Write-Output "KEYTAR_SHA256=$keytarHash"  | Out-File -Append $env:GITHUB_ENV
          Write-Output "conxa-runtime.exe: $winHash"
          Write-Output "keytar.node:          $keytarHash"
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.HOST_VERSION }}
          name: Runtime Host ${{ env.HOST_VERSION }}
          body: |
            ## Runtime Host ${{ env.HOST_VERSION }}

            Large host binary (~85 MB). Ships quarterly or when Node/npm deps change.

            ### SHA-256 checksums
            ```
            conxa-runtime.exe  ${{ env.HOST_WIN_SHA256 }}
            keytar.node           ${{ env.KEYTAR_SHA256 }}
            ```
          files: |
            runtime/dist/conxa-runtime.exe
            runtime/keytar.node
          prerelease: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish conxa_runtime version to the unified signed manifest
        # Writes into the component_versions KV store; the cloud endpoint recomposes
        # and re-signs the full manifest.json immediately after. No private signing
        # key material touches this runner — signing happens cloud-side with
        # CONXA_MANIFEST_SIGNING_KEY, which CI never sees.
        if: vars.CLOUD_API_URL != ''
        run: |
          $body = @{
            version      = "$env:HOST_VERSION"
            released_at  = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            files        = @(
              @{ filename = "conxa-runtime.exe"; url = "https://github.com/$env:GITHUB_REPOSITORY/releases/download/$env:HOST_VERSION/conxa-runtime.exe"; sha256 = "$env:HOST_WIN_SHA256" }
              @{ filename = "keytar.node";       url = "https://github.com/$env:GITHUB_REPOSITORY/releases/download/$env:HOST_VERSION/keytar.node";       sha256 = "$env:KEYTAR_SHA256" }
            )
          } | ConvertTo-Json -Depth 5
          Invoke-RestMethod -Uri "$env:CLOUD_API_URL/api/v1/admin/component-versions/conxa_runtime" `
            -Method POST -Body $body -ContentType "application/json" `
            -Headers @{ Authorization = "Bearer $env:CLOUD_ADMIN_TOKEN" }
        shell: pwsh
        env:
          CLOUD_API_URL:    ${{ vars.CLOUD_API_URL }}
          CLOUD_ADMIN_TOKEN: ${{ secrets.CLOUD_ADMIN_TOKEN }}
