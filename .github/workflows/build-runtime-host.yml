name: Build Runtime Host Layer

# Builds the large host binary (~85 MB) that ships quarterly.
# Contains: Node.js runtime + all bundled npm deps + bootstrap.js entry point.
# Also builds keytar.node which must match the Node ABI in the pkg binary.
#
# Tag format: host-v<semver>  (e.g. host-v1.0.0)

on:
  push:
    tags:
      - "host-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. host-v1.0.0)"
        required: true

jobs:
  build-conxa-runtime:
    runs-on: windows-latest
    permissions:
      contents: write  # needed to create GitHub Releases

    env:
      HOST_VERSION: ${{ github.ref_name || inputs.tag }}
      # Exact Node @yao-pkg/pkg embeds for the node24 target. Keep in lockstep with
      # build-runtime-app.yml's NODE_VERSION so app bytecode matches this exe's V8.
      NODE_VERSION: "24.15.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: runtime/package-lock.json

      - name: Install build tools (NASM + VS Build Tools for keytar)
        run: |
          choco install nasm --no-progress -y
          choco install visualstudio2022buildtools --package-parameters "--add Microsoft.VisualStudio.Workload.VCTools" --no-progress -y
        shell: pwsh

      - name: Install runtime dependencies
        working-directory: runtime
        run: npm ci

      - name: Stamp host_version from release tag
        working-directory: runtime
        run: |
          # bootstrap.js reports HOST_VERSION = require('./package.json').host_version, which
          # is baked into the pkg exe at build time — the $HOST_VERSION env is NOT read at
          # runtime. Stamp the tag here so the exe truthfully reports its release version and
          # the app layer's min_host gate is meaningful.
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $pkg.host_version = "$env:HOST_VERSION"
          $pkg | ConvertTo-Json -Depth 10 | Out-File -Encoding utf8 package.json
          Write-Output "host_version stamped: $env:HOST_VERSION"
        shell: pwsh

      - name: Build conxa-runtime.exe
        working-directory: runtime
        # build:win passes --no-bytecode --public-packages "*" (see runtime/package.json).
        # REQUIRED: pkg's V8 bytecode compilation corrupts Playwright's ~300 KB
        # injectedScriptSource string module, which silently breaks the selector engine —
        # every locator/getByRole/CSS query returns 0 while page.evaluate still works, so
        # all skills fail at the first click. Plain source keeps Playwright functional.
        # Do NOT remove these flags without re-running a real execute_skill replay against
        # the resulting exe (the init-only gate in build-runtime-app.yml will NOT catch it).
        run: npm run build:win

      - name: Stage keytar.node for release
        working-directory: runtime
        run: |
          $src = "node_modules\keytar\build\Release\keytar.node"
          if (-not (Test-Path $src)) {
            Write-Error "keytar.node not found at $src — native build may have failed"
            exit 1
          }
          Copy-Item $src -Destination "keytar.node"
          Write-Output "Staged keytar.node ($((Get-Item keytar.node).Length) bytes)"
        shell: pwsh

      - name: Compute SHA-256 checksums
        working-directory: runtime
        run: |
          $winHash    = (Get-FileHash dist/conxa-runtime.exe -Algorithm SHA256).Hash.ToLower()
          $keytarHash = (Get-FileHash keytar.node               -Algorithm SHA256).Hash.ToLower()
          Write-Output "HOST_WIN_SHA256=$winHash"   | Out-File -Append $env:GITHUB_ENV
          Write-Output "KEYTAR_SHA256=$keytarHash"  | Out-File -Append $env:GITHUB_ENV
          Write-Output "conxa-runtime.exe: $winHash"
          Write-Output "keytar.node:          $keytarHash"
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.HOST_VERSION }}
          name: Runtime Host ${{ env.HOST_VERSION }}
          body: |
            ## Runtime Host ${{ env.HOST_VERSION }}

            Large host binary (~85 MB). Ships quarterly or when Node/npm deps change.

            ### SHA-256 checksums
            ```
            conxa-runtime.exe  ${{ env.HOST_WIN_SHA256 }}
            keytar.node           ${{ env.KEYTAR_SHA256 }}
            ```
          files: |
            runtime/dist/conxa-runtime.exe
            runtime/keytar.node
          prerelease: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish host-manifest to cloud API
        if: vars.CLOUD_API_URL != ''
        run: |
          $body = @{
            host_version  = "$env:HOST_VERSION"
            sha256        = "$env:HOST_WIN_SHA256"
            keytar_sha256 = "$env:KEYTAR_SHA256"
          } | ConvertTo-Json
          Invoke-RestMethod -Uri "$env:CLOUD_API_URL/api/v1/updates/conxa-runtime-manifest" `
            -Method POST -Body $body -ContentType "application/json" `
            -Headers @{ Authorization = "Bearer $env:CLOUD_ADMIN_TOKEN" }
        shell: pwsh
        env:
          CLOUD_API_URL:    ${{ vars.CLOUD_API_URL }}
          CLOUD_ADMIN_TOKEN: ${{ secrets.CLOUD_ADMIN_TOKEN }}
