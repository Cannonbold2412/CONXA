name: Build Runtime App Layer

# Builds the lightweight app layer zip (~60 KB) that ships on every code release.
# Obfuscates JS → zips → uploads to GitHub Release →
# posts the new manifest to the cloud API so the runtime self-updater picks it up.
#
# App layer ships as plain obfuscated JS (NOT V8 bytecode).  Bytecode was dropped
# because @yao-pkg/pkg embeds its own Node build whose V8 differs from official
# nodejs.org Node — same version *string*, different V8 *build* — causing silent
# segfaults when the host exe deserializes bytecode compiled with official Node.
# Obfuscation (self-defending, string-array rc4) still protects the source.
#
# Tag format: app-v<semver>  (e.g. app-v1.2.0)

on:
  push:
    tags:
      - "app-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. app-v1.2.0)"
        required: true

jobs:
  build-conxa-app:
    runs-on: windows-latest
    permissions:
      contents: write  # needed to create GitHub Releases

    env:
      APP_VERSION: ${{ github.ref_name || inputs.tag }}
      # Node version for the build environment — used for obfuscation tooling and
      # npm ci. No longer load-bearing for V8 bytecode compatibility; any 24.x works.
      NODE_VERSION: "24"
      # Must be <= the host_version the SHIPPED host exes actually report. The new
      # .js app layer requires a host that loads server.js (not server.jsc), so this
      # must be bumped to the first host release that ships the updated bootstrap.js.
      # Old hosts skip the new app via this gate and self-update the host first.
      MIN_HOST:    "host-v1.1.1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: runtime/package-lock.json

      - name: Install runtime dependencies
        working-directory: runtime
        run: npm ci

      - name: Install obfuscation tools
        run: npm install -g javascript-obfuscator

      - name: Obfuscate app JS files
        working-directory: runtime
        run: |
          New-Item -ItemType Directory -Force -Path obfuscated
          $files = @(
            "server.js", "sync.js", "run.js", "browser.js",
            "skill_loader.js", "tracker.js", "install_identity.js",
            "bootstrap.js", "recovery.js", "resolve_adapter.js", "resolver.js"
          )
          foreach ($f in $files) {
            javascript-obfuscator $f `
              --output obfuscated/$f `
              --compact true `
              --self-defending true `
              --identifier-names-generator mangled `
              --string-array true `
              --string-array-encoding rc4 `
              --string-array-rotate true `
              --string-array-shuffle true `
              --string-array-threshold 0.75 `
              --dead-code-injection false `
              --debug-protection false
            Write-Output "Obfuscated: $f"
          }
          # auth_manager.js uses process.dlopen and native module patterns that are
          # incompatible with --self-defending obfuscation; obfuscate without it.
          javascript-obfuscator auth_manager.js `
            --output obfuscated/auth_manager.js `
            --compact true `
            --identifier-names-generator mangled `
            --string-array true `
            --string-array-encoding rc4 `
            --string-array-rotate true `
            --string-array-shuffle true `
            --string-array-threshold 0.75 `
            --dead-code-injection false `
            --debug-protection false `
            --self-defending false
          Write-Output "Obfuscated: auth_manager.js (no self-defending)"
        shell: pwsh

      - name: Stage obfuscated JS to dist-app
        working-directory: runtime
        run: |
          Remove-Item -Recurse -Force dist-app -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path dist-app
          $files = @(
            "server", "sync", "run", "browser",
            "skill_loader", "auth_manager", "tracker", "install_identity",
            "bootstrap", "recovery", "resolve_adapter", "resolver"
          )
          foreach ($base in $files) {
            Copy-Item obfuscated/$base.js dist-app/$base.js
            Write-Output "Staged: ${base}.js"
          }
        shell: pwsh

      - name: Generate version.json and compute per-file SHA-256
        working-directory: runtime
        run: |
          $hashes = @{}
          Get-ChildItem dist-app/*.js | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            $hashes[$_.Name] = $hash
            Write-Output "$($_.Name): $hash"
          }
          $meta = @{
            app_version  = $env:APP_VERSION
            min_host     = $env:MIN_HOST
            built_at     = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            files        = $hashes
          } | ConvertTo-Json -Depth 5
          $meta | Out-File -Encoding UTF8 dist-app/version.json
          Write-Output "version.json written"
        shell: pwsh

      - name: Validate app layer against host exe (execution gate)
        working-directory: runtime
        run: |
          # Download the MIN_HOST exe and run a bare MCP initialize against it with
          # the freshly-staged dist-app/ as the conxa-app layer.  This is the only
          # check that would have caught the bytecode-segfault class of bug: it
          # validates the app layer against the *actual* host binary, not a header
          # field that can be normalised.  A non-zero exit or missing init response
          # fails the build before anything is zipped or published.
          $hostVersion  = "$env:MIN_HOST"
          $tmpDir       = "$env:TEMP\conxa-gate-$$"
          $conxaDir     = "$tmpDir\.conxa"
          $appDest      = "$conxaDir\conxa-app"
          New-Item -ItemType Directory -Force -Path $appDest | Out-Null
          New-Item -ItemType Directory -Force -Path "$tmpDir\data\cache" | Out-Null

          Write-Output "Downloading host exe: $hostVersion"
          $exeUrl    = "https://github.com/${{ github.repository }}/releases/download/$hostVersion/conxa-runtime.exe"
          $keytarUrl = "https://github.com/${{ github.repository }}/releases/download/$hostVersion/keytar.node"
          Invoke-WebRequest -Uri $exeUrl    -OutFile "$conxaDir\conxa-runtime.exe" -UseBasicParsing
          Invoke-WebRequest -Uri $keytarUrl -OutFile "$conxaDir\keytar.node"       -UseBasicParsing

          Write-Output "Staging app layer"
          Copy-Item dist-app\* $appDest\ -Recurse

          Write-Output "Running MCP initialize gate…"
          $initMsg = '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"gate","version":"1.0.0"}}}'
          $initMsg | Out-File -FilePath "$tmpDir\init.txt" -Encoding utf8 -NoNewline

          $proc = Start-Process -FilePath "$conxaDir\conxa-runtime.exe" `
            -WorkingDirectory $conxaDir `
            -NoNewWindow -PassThru `
            -RedirectStandardInput  "$tmpDir\init.txt" `
            -RedirectStandardOutput "$tmpDir\out.txt" `
            -RedirectStandardError  "$tmpDir\err.txt" `
            -Environment @{
              CONXA_DIR            = $conxaDir
              CONXA_DATA_DIR       = "$tmpDir\data"
              CONXA_SKIP_SELF_UPDATE = "1"
            }

          $finished = $proc.WaitForExit(20000)
          if (-not $finished) {
            $proc.Kill()
            Remove-Item -Recurse -Force $tmpDir -ErrorAction SilentlyContinue
            Write-Error "EXECUTION GATE: host exe did not exit within 20 s — app layer may be hanging"
            exit 1
          }

          $stdout = Get-Content "$tmpDir\out.txt" -Raw -ErrorAction SilentlyContinue
          $stderr = Get-Content "$tmpDir\err.txt" -Raw -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force $tmpDir -ErrorAction SilentlyContinue

          if ($proc.ExitCode -ne 0) {
            Write-Output "=== STDERR ==="
            Write-Output $stderr
            Write-Error "EXECUTION GATE FAILED: host exe exited $($proc.ExitCode) — likely segfault or load error"
            exit 1
          }
          # Check stderr for "mcp_connected" — the structured log line the runtime emits
          # after the MCP SDK completes connection setup.  This is more reliable than
          # checking stdout for the initialize JSON response, which can be flushed after
          # WaitForExit() returns due to Windows file-redirect buffering.
          if ($stderr -notmatch '"mcp_connected"') {
            Write-Output "=== STDOUT ==="
            Write-Output $stdout
            Write-Output "=== STDERR ==="
            Write-Output $stderr
            Write-Error "EXECUTION GATE FAILED: mcp_connected not found in runtime log — app layer did not fully initialize"
            exit 1
          }
          Write-Output "Execution gate passed: app layer initializes cleanly under $hostVersion"
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Zip app layer
        working-directory: runtime
        run: |
          $zipName = "conxa-app-$env:APP_VERSION.zip"
          Compress-Archive -Path dist-app/* -DestinationPath $zipName -Force
          $hash = (Get-FileHash $zipName -Algorithm SHA256).Hash.ToLower()
          Write-Output "APP_BUNDLE_ZIP=$zipName"    | Out-File -Append $env:GITHUB_ENV
          Write-Output "APP_BUNDLE_SHA256=$hash"    | Out-File -Append $env:GITHUB_ENV
          Write-Output "${zipName}: $hash"
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.APP_VERSION }}
          name: App Layer ${{ env.APP_VERSION }}
          body: |
            ## App Layer ${{ env.APP_VERSION }}

            Lightweight obfuscated-JS app update (~60 KB).
            Minimum host: ${{ env.MIN_HOST }}

            ### SHA-256
            ```
            ${{ env.APP_BUNDLE_ZIP }}  ${{ env.APP_BUNDLE_SHA256 }}
            ```
          files: runtime/${{ env.APP_BUNDLE_ZIP }}
          prerelease: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish app-manifest to cloud API
        if: vars.CLOUD_API_URL != ''
        run: |
          $body = @{
            app_version   = "$env:APP_VERSION"
            min_host      = "$env:MIN_HOST"
            bundle_sha256 = "$env:APP_BUNDLE_SHA256"
          } | ConvertTo-Json
          Invoke-RestMethod -Uri "$env:CLOUD_API_URL/api/v1/updates/conxa-app-manifest" `
            -Method POST -Body $body -ContentType "application/json" `
            -Headers @{ Authorization = "Bearer $env:CLOUD_ADMIN_TOKEN" }
          Write-Output "Manifest posted: app-$env:APP_VERSION"
        shell: pwsh
        env:
          CLOUD_API_URL:    ${{ vars.CLOUD_API_URL }}
          CLOUD_ADMIN_TOKEN: ${{ secrets.CLOUD_ADMIN_TOKEN }}
