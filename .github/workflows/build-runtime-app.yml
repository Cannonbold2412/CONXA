name: Build Runtime App Layer

# Builds the lightweight app layer zip (~60 KB) that ships on every code release.
# Obfuscates JS → compiles to V8 bytecode → zips → uploads to GitHub Release →
# posts the new manifest to the cloud API so the runtime self-updater picks it up.
#
# Tag format: app-v<semver>  (e.g. app-v1.2.0)

on:
  push:
    tags:
      - "app-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. app-v1.2.0)"
        required: true

jobs:
  build-conxa-app:
    runs-on: windows-latest
    permissions:
      contents: write  # needed to create GitHub Releases

    env:
      APP_VERSION: ${{ github.ref_name || inputs.tag }}
      # EXACT Node that @yao-pkg/pkg's node24 base embeds in the host exe. The app
      # bytecode (.jsc) MUST be compiled with this exact version: V8 bytecode is locked to
      # the exact V8 build, and bytenode's fixBytecode defeats V8's cachedDataRejected
      # safety check — so a near-miss (e.g. 24.15.0 vs another 24.x) is accepted and then
      # HARD-CRASHES (segfault) deserializing at runtime. If pkg bumps its node24 base,
      # bump this in lockstep — verify with: grep -aoE 'v24\.[0-9]+\.[0-9]+' conxa-runtime.exe
      NODE_VERSION: "24.15.0"
      # Must be <= the host_version the SHIPPED host exes actually report (bootstrap.js
      # reads runtime/package.json host_version, baked at build time). Raising this requires
      # FIRST re-releasing the host with a tag-stamped host_version (see build-runtime-host.yml)
      # — otherwise installed runtimes reject the app layer at bootstrap and FATAL-exit.
      MIN_HOST:    "host-v1.0.8"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: runtime/package-lock.json

      - name: Install runtime dependencies
        working-directory: runtime
        run: npm ci

      - name: Install obfuscation and bytecode tools
        run: npm install -g javascript-obfuscator bytenode

      - name: Obfuscate app JS files
        working-directory: runtime
        run: |
          New-Item -ItemType Directory -Force -Path obfuscated
          $files = @(
            "server.js", "sync.js", "run.js", "browser.js",
            "skill_loader.js", "tracker.js", "install_identity.js",
            "bootstrap.js", "recovery.js", "resolve_adapter.js", "resolver.js"
          )
          foreach ($f in $files) {
            javascript-obfuscator $f `
              --output obfuscated/$f `
              --compact true `
              --self-defending true `
              --identifier-names-generator mangled `
              --string-array true `
              --string-array-encoding rc4 `
              --string-array-rotate true `
              --string-array-shuffle true `
              --string-array-threshold 0.75 `
              --dead-code-injection false `
              --debug-protection false
            Write-Output "Obfuscated: $f"
          }
          # auth_manager.js uses process.dlopen and native module patterns that are
          # incompatible with --self-defending obfuscation; copy it unobfuscated so
          # bytenode can compile it cleanly (bytecode still provides IP protection).
          Copy-Item auth_manager.js obfuscated/auth_manager.js
        shell: pwsh

      - name: Compile obfuscated JS to V8 bytecode
        working-directory: runtime
        run: |
          Remove-Item -Recurse -Force dist-app -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path dist-app
          $files = @(
            "server", "sync", "run", "browser",
            "skill_loader", "auth_manager", "tracker", "install_identity",
            "bootstrap", "recovery", "resolve_adapter", "resolver"
          )
          foreach ($base in $files) {
            node -e @"
          const bytenode = require('bytenode');
          bytenode.compileFile({ filename: 'obfuscated/$base.js', output: 'dist-app/$base.jsc', electron: false });
          "@
            if ($LASTEXITCODE -ne 0) { Write-Error "Failed to compile ${base}.js"; exit 1 }
            Write-Output "Compiled: ${base}.jsc"
          }
        shell: pwsh

      - name: Generate version.json and compute per-file SHA-256
        working-directory: runtime
        run: |
          $hashes = @{}
          Get-ChildItem dist-app/*.jsc | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            $hashes[$_.Name] = $hash
            Write-Output "$($_.Name): $hash"
          }
          $meta = @{
            app_version  = $env:APP_VERSION
            min_host     = $env:MIN_HOST
            built_at     = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
            files        = $hashes
          } | ConvertTo-Json -Depth 5
          $meta | Out-File -Encoding UTF8 dist-app/version.json
          Write-Output "version.json written"
        shell: pwsh

      - name: Validate bytecode compatibility
        working-directory: runtime
        run: |
          node -e @"
          // Validate each .jsc exactly the way bytenode loads it at runtime, so a
          // PASS here means 'the runtime can load this bytecode'. Do NOT validate
          // with an empty source string: V8 keys its code-cache sanity check on the
          // source LENGTH (stored at bytes 8-12 of the .jsc), so an empty source
          // mismatches every file and spuriously trips cachedDataRejected for some
          // of them (this is what flagged auth_manager.jsc as a false positive).
          // Instead, read the stored length and build a dummy of that exact length,
          // and apply bytenode's flag-hash normalization (fixBytecode) first — the
          // same steps bytenode's loader performs. This checks V8 version/format
          // compatibility; payload integrity is already covered by the SHA-256 step.
          const bytenode = require('bytenode'); // sets the V8 flags used at compile
          const vm = require('vm');
          const fs = require('fs');
          const dummyBC = new vm.Script('\"ಠ_ಠ\"', { produceCachedData: true }).cachedData;
          const v = parseFloat(process.version.slice(1, 5));
          function fixBytecode(buf) {
            dummyBC.subarray(12, 16).copy(buf, 12);
            if (v >= 24) dummyBC.subarray(16, 20).copy(buf, 16);
          }
          function readSourceLength(buf) {
            return buf.subarray(8, 12).reduce((s, n, p) => s + n * Math.pow(256, p), 0);
          }
          const files = fs.readdirSync('./dist-app').filter(f => f.endsWith('.jsc'));
          let ok = true;
          for (const f of files) {
            const buf = fs.readFileSync('./dist-app/' + f);
            fixBytecode(buf);
            const len = readSourceLength(buf);
            const zwsp = String.fromCharCode(0x200b); // zero-width space, as bytenode uses
            const dummy = len > 1 ? '\"' + zwsp.repeat(len - 2) + '\"' : '';
            const script = new vm.Script(dummy, { cachedData: buf });
            if (script.cachedDataRejected) {
              console.error('INCOMPATIBLE: ' + f);
              ok = false;
            } else {
              console.log('OK: ' + f);
            }
          }
          // The header check above (cachedDataRejected) does NOT catch the failure we hit in
          // practice: a near-miss V8 build is ACCEPTED at vm.Script time and then segfaults
          // when V8 actually deserializes/runs the bytecode. So additionally EXECUTE two
          // self-contained leaf modules' bytecode via require(). resolver.js and recovery.js
          // have no requires and no top-level side effects, so loading them proves the V8 ABI
          // for every .jsc compiled in this same step. A mismatch throws or hard-crashes here.
          const path = require('path');
          for (const leaf of ['resolver.jsc', 'recovery.jsc']) {
            require(path.resolve('./dist-app/' + leaf));
            console.log('EXECUTED: ' + leaf);
          }
          if (!ok) process.exit(1);
          "@
          if ($LASTEXITCODE -ne 0) { exit 1 }
          Write-Output "Bytecode validation passed"
        shell: pwsh

      - name: Zip app layer
        working-directory: runtime
        run: |
          $zipName = "conxa-app-$env:APP_VERSION.zip"
          Compress-Archive -Path dist-app/* -DestinationPath $zipName -Force
          $hash = (Get-FileHash $zipName -Algorithm SHA256).Hash.ToLower()
          Write-Output "APP_BUNDLE_ZIP=$zipName"    | Out-File -Append $env:GITHUB_ENV
          Write-Output "APP_BUNDLE_SHA256=$hash"    | Out-File -Append $env:GITHUB_ENV
          Write-Output "${zipName}: $hash"
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.APP_VERSION }}
          name: App Layer ${{ env.APP_VERSION }}
          body: |
            ## App Layer ${{ env.APP_VERSION }}

            Lightweight bytecode-compiled app update (~60 KB).
            Minimum host: ${{ env.MIN_HOST }}

            ### SHA-256
            ```
            ${{ env.APP_BUNDLE_ZIP }}  ${{ env.APP_BUNDLE_SHA256 }}
            ```
          files: runtime/${{ env.APP_BUNDLE_ZIP }}
          prerelease: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish app-manifest to cloud API
        if: vars.CLOUD_API_URL != ''
        run: |
          $body = @{
            app_version   = "$env:APP_VERSION"
            min_host      = "$env:MIN_HOST"
            bundle_sha256 = "$env:APP_BUNDLE_SHA256"
          } | ConvertTo-Json
          Invoke-RestMethod -Uri "$env:CLOUD_API_URL/api/v1/updates/conxa-app-manifest" `
            -Method POST -Body $body -ContentType "application/json" `
            -Headers @{ Authorization = "Bearer $env:CLOUD_ADMIN_TOKEN" }
          Write-Output "Manifest posted: app-$env:APP_VERSION"
        shell: pwsh
        env:
          CLOUD_API_URL:    ${{ vars.CLOUD_API_URL }}
          CLOUD_ADMIN_TOKEN: ${{ secrets.CLOUD_ADMIN_TOKEN }}
